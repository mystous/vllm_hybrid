# /etc/sysctl.d/99-spec-decode-hugepages.conf
# 2 MB × 4096 = 8 GB hugepages reserved
# AMX worker matmul shape (Qwen 32B B=128 K=5120 N=27648 BF16) = ~142 MB / shape
# 20 workers × 2 buffers × 142 MB ≈ 5.7 GB → 8 GB 충분

vm.nr_hugepages = 4096
vm.hugetlb_shm_group = 0

# NUMA balancing OFF — sched_setaffinity 의 명시 핀을 OS 가 옮기지 못하게
kernel.numa_balancing = 0

# 적용:
# sudo sysctl -p /etc/sysctl.d/99-spec-decode-hugepages.conf

# 검증:
# cat /proc/meminfo | grep -E "HugePages_Total|HugePages_Free|Hugepagesize"
#   HugePages_Total: 4096
#   HugePages_Free:  4096   (사용 전)
#   Hugepagesize:    2048 kB
