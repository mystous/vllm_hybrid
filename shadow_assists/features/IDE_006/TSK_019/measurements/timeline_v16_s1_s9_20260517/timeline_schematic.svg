<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 900" font-family="Menlo, monospace" font-size="11">
  <rect width="1500" height="900" fill="#fafafa"/>

  <!-- TITLE -->
  <text x="750" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">vanilla vs NEO S1-S9 (NEO 원본 100% 정합) — 1-step Timeline + 변경 영역 표시</text>
  <text x="750" y="40" text-anchor="middle" font-size="11" fill="#555">
    S1-S9: ThreadPool 제거 (직접 호출, S5) + s0/s1 stream 제거 (S7) + forward_double NEO §4.4 ordering (S8) + result copy on cpu_communication_stream (S9). 측정 KST 2026-05-17 (Run 1 = 2,303 tps).
  </text>

  <!-- ============================================================== -->
  <!-- TIME AXIS — 0 ~ 120 ms, 10 ms = 110 px, x=160 시작 ~ x=1480 -->
  <!-- 1 ms = 11 px -->
  <!-- ============================================================== -->
  <line x1="160" y1="820" x2="1480" y2="820" stroke="#444" stroke-width="1"/>
  <g font-size="10" fill="#444">
    <text x="160" y="840" text-anchor="middle">0</text>
    <text x="270" y="840" text-anchor="middle">10</text>
    <text x="380" y="840" text-anchor="middle">20</text>
    <text x="490" y="840" text-anchor="middle">30</text>
    <text x="600" y="840" text-anchor="middle">40</text>
    <text x="694" y="855" text-anchor="middle" font-weight="bold" fill="#0a7c3a">54 ms ← vanilla 끝</text>
    <text x="710" y="840" text-anchor="middle">50</text>
    <text x="820" y="840" text-anchor="middle">60</text>
    <text x="930" y="840" text-anchor="middle">70</text>
    <text x="1040" y="840" text-anchor="middle">80</text>
    <text x="1150" y="840" text-anchor="middle">90</text>
    <text x="1260" y="840" text-anchor="middle">100</text>
    <text x="1370" y="840" text-anchor="middle">110</text>
    <text x="1425" y="855" text-anchor="middle" font-weight="bold" fill="#c00">115 ms ← NEO 끝</text>
  </g>
  <g stroke="#aaa" stroke-width="0.5">
    <line x1="160" y1="816" x2="160" y2="824"/>
    <line x1="270" y1="816" x2="270" y2="824"/>
    <line x1="380" y1="816" x2="380" y2="824"/>
    <line x1="490" y1="816" x2="490" y2="824"/>
    <line x1="600" y1="816" x2="600" y2="824"/>
    <line x1="710" y1="816" x2="710" y2="824"/>
    <line x1="820" y1="816" x2="820" y2="824"/>
    <line x1="930" y1="816" x2="930" y2="824"/>
    <line x1="1040" y1="816" x2="1040" y2="824"/>
    <line x1="1150" y1="816" x2="1150" y2="824"/>
    <line x1="1260" y1="816" x2="1260" y2="824"/>
    <line x1="1370" y1="816" x2="1370" y2="824"/>
  </g>
  <!-- vanilla finish line (vertical, x = 160 + 54*11 = 754) -->
  <line x1="754" y1="60" x2="754" y2="820" stroke="#0a7c3a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="760" y="55" font-size="10" font-weight="bold" fill="#0a7c3a">vanilla 54 ms</text>
  <!-- NEO finish line (x = 160 + 115*11 = 1425) -->
  <line x1="1425" y1="60" x2="1425" y2="820" stroke="#c00" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1431" y="55" font-size="10" font-weight="bold" fill="#c00">NEO 115 ms</text>

  <!-- ============================================================== -->
  <!-- TOP HALF: vanilla 1 step (NEO OFF) — 4 lane, all active in 0~54 ms -->
  <!-- ============================================================== -->
  <text x="155" y="82" text-anchor="end" font-weight="bold" fill="#222">vanilla (NEO OFF)</text>
  <text x="155" y="98" text-anchor="end" font-size="9" fill="#777">3-run avg 4,690.7 tps</text>

  <!-- Lane 1: vanilla main thread (Python) -->
  <text x="155" y="138" text-anchor="end" fill="#222">Main thread (Py)</text>
  <line x1="160" y1="155" x2="1480" y2="155" stroke="#ddd"/>
  <rect x="160" y="120" width="22" height="34" fill="#ffd966" stroke="#caa040" stroke-width="0.5"/>
  <text x="171" y="142" text-anchor="middle" font-size="8">sched</text>
  <rect x="182" y="120" width="572" height="34" fill="#fce5cd" stroke="#caa040" stroke-width="0.5"/>
  <text x="468" y="142" text-anchor="middle" font-size="10">Python forward (vanilla GPU dispatch, 80 layer × cuBLAS+Attn+Norm+AllReduce)</text>

  <!-- Lane 2: vanilla GPU stream -->
  <text x="155" y="190" text-anchor="end" fill="#222">GPU stream</text>
  <line x1="160" y1="207" x2="1480" y2="207" stroke="#ddd"/>
  <rect x="182" y="170" width="572" height="34" fill="#b6d7a8" stroke="#6aa84f" stroke-width="0.5"/>
  <text x="468" y="192" text-anchor="middle" font-size="10">GPU compute (GEMM + FlashAttn + rms_norm + NCCL ×320) ≈ 54 ms</text>

  <!-- Lane 3: vanilla NCCL barriers — 320 across 54ms — 9 sample dots at uniform spread -->
  <text x="155" y="240" text-anchor="end" fill="#222">NCCL barrier</text>
  <line x1="160" y1="257" x2="1480" y2="257" stroke="#ddd"/>
  <g fill="#d62828">
    <rect x="232" y="218" width="3" height="34"/>
    <rect x="294" y="218" width="3" height="34"/>
    <rect x="356" y="218" width="3" height="34"/>
    <rect x="418" y="218" width="3" height="34"/>
    <rect x="480" y="218" width="3" height="34"/>
    <rect x="542" y="218" width="3" height="34"/>
    <rect x="604" y="218" width="3" height="34"/>
    <rect x="666" y="218" width="3" height="34"/>
    <rect x="728" y="218" width="3" height="34"/>
  </g>
  <text x="468" y="240" text-anchor="middle" font-size="9" fill="#222">AllReduce ×320 (layer 당 4), 평균 55 μs/call, sum ~17.6 ms</text>

  <!-- Lane 4: vanilla swap/cdec/etc — NONE -->
  <text x="155" y="290" text-anchor="end" fill="#222">CPU side</text>
  <line x1="160" y1="307" x2="1480" y2="307" stroke="#ddd"/>
  <text x="468" y="290" text-anchor="middle" font-size="10" fill="#888" font-style="italic">— (vanilla 는 CPU work 없음, KV 전부 GPU resident) —</text>

  <!-- divider between vanilla and NEO -->
  <line x1="0" y1="335" x2="1500" y2="335" stroke="#444" stroke-width="1"/>

  <!-- ============================================================== -->
  <!-- BOTTOM HALF: NEO v1.6 1 step — 7 lane, active in 0~115 ms -->
  <!-- vanilla 영역 (0-54 ms) 와 NEO 추가 영역 (54-115 ms) 색 구분 -->
  <!-- ============================================================== -->
  <text x="155" y="357" text-anchor="end" font-weight="bold" fill="#222">NEO v1.6 (3-run avg 2,197.4 tps)</text>
  <rect x="160" y="345" width="595" height="14" fill="#e8f3e0" stroke="none"/>
  <text x="457" y="356" text-anchor="middle" font-size="9" fill="#0a7c3a">↓ vanilla 와 동일 GPU compute 영역 (0~54 ms)</text>
  <rect x="755" y="345" width="670" height="14" fill="#ffe6e6" stroke="none"/>
  <text x="1090" y="356" text-anchor="middle" font-size="9" fill="#c00">↓ NEO 추가 영역 (54~115 ms, +61 ms)</text>

  <!-- Lane 1: NEO main thread -->
  <text x="155" y="392" text-anchor="end" fill="#222">Main thread (Py)</text>
  <line x1="160" y1="410" x2="1480" y2="410" stroke="#ddd"/>
  <!-- scheduler.decide_mode + sub_batch attach (0-2ms = 0-22px) -->
  <rect x="160" y="375" width="22" height="34" fill="#ffd966" stroke="#caa040" stroke-width="0.5"/>
  <text x="171" y="397" text-anchor="middle" font-size="8">sched</text>
  <!-- Python forward (vanilla 영역, 2-54ms = 22-594px → x=182, w=572) -->
  <rect x="182" y="375" width="572" height="34" fill="#fce5cd" stroke="#caa040" stroke-width="0.5"/>
  <text x="468" y="397" text-anchor="middle" font-size="10">Python forward (80 layer, GPU dispatch — vanilla 동일 영역)</text>
  <!-- ★ NEO 추가 1: Python attention.py hot path overhead (skip_gpu check, _neo_drain, cdec submit, cudaStream sync) -->
  <rect x="754" y="375" width="132" height="34" fill="#f4cccc" stroke="#c44545" stroke-width="1"/>
  <text x="820" y="395" text-anchor="middle" font-size="9" fill="#c00">★ Py hot path</text>
  <text x="820" y="406" text-anchor="middle" font-size="8" fill="#000">+12 ms</text>
  <!-- ★ NEO 추가 2: cdec_future.result() wait (cdec dispatch blocking) -->
  <rect x="886" y="375" width="264" height="34" fill="#f4cccc" stroke="#c44545" stroke-width="1"/>
  <text x="1018" y="395" text-anchor="middle" font-size="9" fill="#c00">★ cdec_future.result() wait (BLOCKING)</text>
  <text x="1018" y="406" text-anchor="middle" font-size="8" fill="#000">+24 ms</text>
  <!-- swap_in launch (next step) + sample/emit -->
  <rect x="1150" y="375" width="275" height="34" fill="#fce5cd" stroke="#caa040" stroke-width="0.5"/>
  <text x="1287" y="395" text-anchor="middle" font-size="9">swap_in launch + sample + emit</text>
  <text x="1287" y="406" text-anchor="middle" font-size="8">+25 ms</text>

  <!-- Lane 2: NEO main stream (S7: s0/s1 stream 제거, default + cpu_communication_stream 만 사용) -->
  <text x="155" y="438" text-anchor="end" fill="#222">GPU main stream</text>
  <text x="155" y="450" text-anchor="end" font-size="8" fill="#777">b0 + b1 sequential (S7)</text>
  <line x1="160" y1="462" x2="1480" y2="462" stroke="#ddd"/>
  <rect x="182" y="427" width="893" height="34" fill="#b6d7a8" stroke="#6aa84f" stroke-width="0.5"/>
  <text x="628" y="445" text-anchor="middle" font-size="10">main stream 위 sequential: forward_double Stage 0 + Stage 1 (NEO §4.4 batch interleave, S8)</text>
  <text x="628" y="457" text-anchor="middle" font-size="8" fill="#1a3a6b">Stage 0: transfer(b1) → preproj(b0, i+1) → attention(b1, i)  ║  Stage 1: transfer(b0) → postproj(b1) + preproj(b1) → attention(b0, i+1) → postproj(b0)</text>
  <!-- GPU idle 영역 (자그만 — S8 batch interleave 로 단축) -->
  <rect x="1075" y="427" width="350" height="34" fill="#eeeeee" stroke="#999" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="1250" y="445" text-anchor="middle" font-size="9" fill="#666">★ GPU IDLE (단축) — S5 직접 호출 영향</text>
  <text x="1250" y="457" text-anchor="middle" font-size="8" fill="#666">measured wall: 1,763 s (Run 1 best)</text>

  <!-- NEO 의 NCCL barrier — GPU stream0 lane 위에 dot overlay (별도 lane 안 만들고) -->
  <g fill="#d62828">
    <rect x="232" y="427" width="3" height="34"/>
    <rect x="294" y="427" width="3" height="34"/>
    <rect x="356" y="427" width="3" height="34"/>
    <rect x="418" y="427" width="3" height="34"/>
    <rect x="480" y="427" width="3" height="34"/>
    <rect x="542" y="427" width="3" height="34"/>
    <rect x="604" y="427" width="3" height="34"/>
    <rect x="666" y="427" width="3" height="34"/>
    <rect x="728" y="427" width="3" height="34"/>
  </g>
  <text x="600" y="425" font-size="9" fill="#d62828">↓ NCCL AllReduce ×320 (layer 당 4, vanilla 동일, sum ~17.6 ms — GPU active 영역 안)</text>

  <!-- Lane 3: 사용 X — S7 에서 s1 stream 제거. comment 영역 -->
  <text x="155" y="492" text-anchor="end" fill="#222">(s1 stream 제거)</text>
  <text x="155" y="504" text-anchor="end" font-size="8" fill="#777">S7 적용</text>
  <line x1="160" y1="515" x2="1480" y2="515" stroke="#eee"/>
  <rect x="182" y="480" width="893" height="34" fill="#f0f0f0" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="628" y="500" text-anchor="middle" font-size="9" fill="#666">s1 stream lane 제거 — NEO 원본 정합 (single main stream 위 sequential 진행)</text>

  <!-- Lane 4: cdec compute (main thread 직접 호출) — S5 적용 -->
  <text x="155" y="545" text-anchor="end" fill="#222">cdec compute</text>
  <text x="155" y="556" text-anchor="end" font-size="8" fill="#777">(main thread 직접 호출, S5)</text>
  <line x1="160" y1="572" x2="1480" y2="572" stroke="#eee"/>
  <rect x="225" y="535" width="850" height="34" fill="#cfe2f3" stroke="#3061ab" stroke-width="0.5"/>
  <text x="650" y="555" text-anchor="middle" font-size="9">CPU pacpu — main thread blocking (NEO 원본 `paged_attention_cpu` 직접 호출)</text>
  <text x="650" y="567" text-anchor="middle" font-size="8" fill="#1a3a6b">ThreadPoolExecutor 제거 (S5) → GIL race 제거 + future.result() 즉시 return (`_NeoDirectFuture`)</text>

  <!-- ★ S9 cpu_communication_stream 위 result copy + _compute_wait_comm  -->
  <rect x="1075" y="535" width="200" height="34" fill="#a4c2f4" stroke="#3061ab" stroke-width="1"/>
  <text x="1175" y="552" text-anchor="middle" font-size="9" fill="#1a3a6b">★ S9: result D2D copy</text>
  <text x="1175" y="564" text-anchor="middle" font-size="8" fill="#1a3a6b">cpu_comm_stream + _compute_wait_comm</text>

  <!-- Lane 5: async_output thread — concurrent background -->
  <text x="155" y="611" text-anchor="end" fill="#222">async_output thread</text>
  <text x="155" y="622" text-anchor="end" font-size="8" fill="#777">(background concurrent)</text>
  <line x1="160" y1="630" x2="1480" y2="630" stroke="#eee"/>
  <rect x="160" y="595" width="1110" height="32" fill="#cfe2f3" stroke="#3061ab" stroke-width="0.5"/>
  <text x="715" y="615" text-anchor="middle" font-size="9">background poll on previous step GPU events (concurrent with main + cdec)</text>
  <rect x="1270" y="595" width="155" height="32" fill="#9fc5e8" stroke="#3061ab" stroke-width="0.7"/>
  <text x="1347" y="612" text-anchor="middle" font-size="8">cudaEventSync</text>
  <text x="1347" y="622" text-anchor="middle" font-size="8">+ token emit</text>

  <!-- Lane 6: swap stream (D2H/H2D async, overlap with forward) -->
  <text x="155" y="652" text-anchor="end" fill="#222">Swap stream</text>
  <text x="155" y="663" text-anchor="end" font-size="8" fill="#777">(cudaMemcpyAsync)</text>
  <line x1="160" y1="672" x2="1480" y2="672" stroke="#eee"/>
  <rect x="200" y="637" width="540" height="32" fill="#a4c2f4" stroke="#3061ab" stroke-width="0.5"/>
  <text x="470" y="651" text-anchor="middle" font-size="9">D2H swap_out (async, GPU compute 와 overlap → wall hide ✓)</text>
  <text x="470" y="663" text-anchor="middle" font-size="8" fill="#1a3a6b">25 GB / 60s = 0.42 GB/s (PCIe gen5 의 1.3%, bandwidth 영역 영향 X)</text>
  <rect x="1180" y="637" width="245" height="32" fill="#a4c2f4" stroke="#3061ab" stroke-width="0.5"/>
  <text x="1303" y="651" text-anchor="middle" font-size="9">H2D swap_in (async)</text>
  <text x="1303" y="663" text-anchor="middle" font-size="8" fill="#1a3a6b">next step prep</text>

  <!-- Lane 7: NEO 추가 영역의 분해 (CPU thread idle) -->
  <text x="155" y="703" text-anchor="end" fill="#222">CPU thread state</text>
  <text x="155" y="716" text-anchor="end" font-size="9" fill="#777">(OS Runtime)</text>
  <line x1="160" y1="722" x2="1480" y2="722" stroke="#ddd"/>
  <rect x="182" y="688" width="572" height="34" fill="#e8f3e0" stroke="#6aa84f" stroke-width="0.5"/>
  <text x="468" y="710" text-anchor="middle" font-size="9">main thread active (Py dispatch) + cdec worker active (pacpu)</text>
  <rect x="754" y="688" width="396" height="34" fill="#fff2cc" stroke="#caa040" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="952" y="708" text-anchor="middle" font-size="9" fill="#a06000">★ pthread_cond_timedwait 30.2% + poll 27.5% + epoll_wait 25.7%</text>
  <text x="952" y="719" text-anchor="middle" font-size="8" fill="#a06000">→ CPU thread 90% idle wait 영역 (cdec result, NCCL barrier 등)</text>
  <rect x="1150" y="688" width="275" height="34" fill="#fce5cd" stroke="#caa040" stroke-width="0.5"/>
  <text x="1287" y="710" text-anchor="middle" font-size="9">main thread swap launch + Python overhead</text>

  <!-- ============================================================== -->
  <!-- BOTTOM: S1-S9 의 NEO 추가 영역 분해 + 3-run avg fact -->
  <!-- ============================================================== -->
  <text x="160" y="770" font-size="13" font-weight="bold" fill="#c00">★ NEO S1-S9 (정통) — vanilla 54 ms vs NEO ~109 ms (3-run avg wall 1,819 s)</text>

  <g font-size="10">
    <text x="170" y="790" fill="#222">①</text>
    <rect x="190" y="780" width="14" height="14" fill="#f4cccc" stroke="#c44545"/>
    <text x="210" y="790" fill="#222">Python attention.py hot path × 80 layer : <tspan font-weight="bold">+12 ms</tspan> (skip_gpu check, _neo_drain (no-op), 직접 호출 launch)</text>

    <text x="170" y="808" fill="#222">②</text>
    <rect x="190" y="798" width="14" height="14" fill="#cfe2f3" stroke="#3061ab"/>
    <text x="210" y="808" fill="#222">cdec compute (S5 직접 호출, main thread blocking) : <tspan font-weight="bold">+18 ms</tspan> (S1-S8 의 ThreadPool/queue overhead 제거 후 단축, S9 cpu_comm_stream 의 hide 영향)</text>

    <text x="800" y="790" fill="#222">③</text>
    <rect x="820" y="780" width="14" height="14" fill="#fce5cd" stroke="#caa040"/>
    <text x="840" y="790" fill="#222">swap launch + Python overhead + emit : <tspan font-weight="bold">+25 ms</tspan> (After-NEO ★ Top Priority lever)</text>

    <text x="800" y="808" fill="#222">합</text>
    <text x="820" y="808" fill="#000">12 + 18 + 25 = <tspan font-weight="bold" fill="#c00">+55 ms / step</tspan>  →  vanilla 54 + 55 = 109 ms (S1-S9 avg, v1.6 best 115 ms 보다 −5%)</text>
  </g>

  <!-- 3-run fact summary -->
  <g font-size="10" transform="translate(160, 830)">
    <text x="0" y="0" font-weight="bold" fill="#0a7c3a">★ S1-S9 3-run fact (KST 2026-05-17):</text>
    <text x="0" y="14" fill="#000">Run 1: 2,303.4 tps / 1,763s  |  Run 2: 2,153.6 / 1,889s  |  Run 3: 2,258.9 / 1,806s  |  avg: <tspan font-weight="bold">2,238.6 tps</tspan> (vs v1.6 best avg 2,197.4 = +1.9%) | CV 3.44%</text>
  </g>

  <!-- LEGEND -->
  <g font-size="9" transform="translate(1240, 67)">
    <text x="0" y="-2" font-weight="bold">Legend</text>
    <rect x="0" y="5" width="14" height="14" fill="#fce5cd" stroke="#caa040"/>
    <text x="18" y="15" fill="#000">main thread Python</text>
    <rect x="0" y="22" width="14" height="14" fill="#f4cccc" stroke="#c44545"/>
    <text x="18" y="32" fill="#000">★ NEO 추가 영역</text>
    <rect x="0" y="39" width="14" height="14" fill="#b6d7a8" stroke="#6aa84f"/>
    <text x="18" y="49" fill="#000">GPU compute (active)</text>
    <rect x="0" y="56" width="14" height="14" fill="#eeeeee" stroke="#999" stroke-dasharray="3,2"/>
    <text x="18" y="66" fill="#000">GPU idle (★)</text>
    <rect x="0" y="73" width="14" height="14" fill="#cfe2f3" stroke="#3061ab"/>
    <text x="18" y="83" fill="#000">cdec_executor (CPU pacpu)</text>
    <rect x="0" y="90" width="14" height="14" fill="#a4c2f4" stroke="#3061ab"/>
    <text x="18" y="100" fill="#000">Swap stream (async, hide)</text>
    <rect x="0" y="107" width="14" height="14" fill="#fff2cc" stroke="#caa040" stroke-dasharray="3,2"/>
    <text x="18" y="117" fill="#000">CPU thread idle wait</text>
    <rect x="0" y="124" width="3" height="14" fill="#d62828"/>
    <text x="18" y="134" fill="#000">NCCL AllReduce</text>
  </g>
</svg>
