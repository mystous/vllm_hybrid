    <text x="170" y="790" fill="#222">합</text>
    <text x="210" y="790" fill="#000">12 + 24 + 25 = <tspan font-weight="bold" fill="#c00">+61 ms / step</tspan> → vanilla 54 + 61 = NEO 115 ms ✓</text>
