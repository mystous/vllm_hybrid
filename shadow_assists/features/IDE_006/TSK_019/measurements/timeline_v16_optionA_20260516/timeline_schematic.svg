    <text x="170" y="750" fill="#222">②</text>
    <rect x="190" y="740" width="14" height="14" fill="#f4cccc" stroke="#c44545"/>
    <text x="210" y="750" fill="#222">CPU pacpu wall &gt; GPU concurrent wall → 차이 누적 : <tspan font-weight="bold">+24 ms</tspan> (ThreadPool GIL/queue overhead 가중, S1-S9 의 +18 보다 +6)</text>

    <text x="170" y="770" fill="#222">③</text>
    <rect x="190" y="760" width="14" height="14" fill="#fce5cd" stroke="#caa040"/>
