  <text x="160" y="710" font-size="13" font-weight="bold" fill="#c00">★ NEO v1.6 추가 wall 분해 (vanilla 54 ms → NEO 115 ms, overlap 작동 + ThreadPool overhead)</text>

  <g font-size="10">
